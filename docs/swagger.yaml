        type: string
      db_type:
        type: string
      default_role:
        type: string
      entity_name:
        type: string
      environment:
        type: string
      failover_type:
        type: string
      ha_type:
        type: string
      host_environment1:
        type: string
      host_environment2:
        type: string
      host_infra_type1:
        type: string
      host_infra_type2:
        type: string
      host_ip1:
        type: string
      host_ip2:
        type: string
      host_name2:
        type: string
      host_namel:
        type: string
      id:
