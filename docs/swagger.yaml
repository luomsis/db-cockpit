info:
  contact: {}
  description: RESTful API for querying time series data from TimescaleDB
  title: Data Query Service API
  version: "1.0"
paths:
  /endpoints:
    get:
      description: Get all distinct endpoints from the time series database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dataquery.EndpointsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
      summary: Get all endpoints
      tags:
      - endpoints
  /instances/{endpoint}:
    get:
      description: Get database instance metadata (db_type, entity_name, instance_vip,
        instance_port, etc.) by endpoint
      parameters:
      - description: Instance endpoint
        in: path
        name: endpoint
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dataquery.InstanceMetaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
      summary: Get instance metadata by endpoint
      tags:
      - instances
  /metrics:
    get:
      description: Get all distinct metrics for a specific endpoint
      parameters:
      - description: Endpoint name
        in: query
        name: endpoint
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dataquery.MetricsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
      summary: Get metrics for an endpoint
      tags:
      - metrics
  /series:
    get:
      description: Query time series data with optional filters
      parameters:
      - description: Endpoint filter
        in: query
        name: endpoint
        type: string
      - description: Metric filter
        in: query
        name: metric
        type: string
      - description: Label filter expression
        in: query
        name: label_filter
        type: string
      - description: Start time (RFC3339 or Unix timestamp)
        in: query
        name: start
        required: true
        type: string
      - description: End time (RFC3339 or Unix timestamp)
        in: query
        name: end
        required: true
        type: string
      - description: Maximum number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dataquery.SeriesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
      summary: Query series data
      tags:
      - series
  /series/{id}:
    get:
      description: Get a single time series by its ID with optional time range
      parameters:
      - description: Series ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Start time (RFC3339 or Unix timestamp, default: 1 hour ago)'
        in: query
        name: start
        type: string
      - description: 'End time (RFC3339 or Unix timestamp, default: now)'
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dataquery.SeriesSingleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
      summary: Get series by ID
      tags:
      - series
  /series/query:
    post:
      consumes:
      - application/json
      description: Query multiple time series with complex filters and optional aggregation
      parameters:
      - description: Query parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dataquery.SeriesQueryRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dataquery.SeriesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dataquery.ErrorResponse'
      summary: Query multiple series
      tags:
      - series
swagger: "2.0"
