basePath: /api/v1
definitions:
  dataquery.DataPointDTO:
    properties:
      time:
        type: string
      value:
        type: number
    type: object
  dataquery.EndpointsResponse:
    properties:
      data:
        items:
          type: string
        type: array
    type: object
  dataquery.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  dataquery.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dataquery.ErrorDetail'
    type: object
  dataquery.InstanceMeta:
    properties:
      alert_subscriber:
        type: string
      attach_db:
        type: string
      backup_method:
        type: string
      business_owner:
        type: string
      ccm_name:
        type: string
      character_set:
        type: string
      chinese_desc:
        type: string
