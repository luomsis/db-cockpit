      req_memory_gb:
        type: number
      req_storage_gb:
        type: number
      role:
        type: string
      service_user:
        type: string
      source_sys:
        type: string
      status:
        type: string
      subsys_code:
        type: string
      user_name:
        type: string
      version_detail:
        type: string
    type: object
  dataquery.InstanceMetaResponse:
    properties:
      data:
        $ref: '#/definitions/dataquery.InstanceMeta'
    type: object
  dataquery.MetricsResponse:
    properties:
      data:
        items:
          type: string
        type: array
    type: object
  dataquery.SeriesDataDTO:
    properties:
      created_at:
        type: string
      endpoint:
